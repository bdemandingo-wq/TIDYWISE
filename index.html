<!doctype html>
<html lang="en">
  <head>
    <!-- Order matters for SEO scorers: charset → viewport → title →
         description → og:* → twitter:* → canonical → THEN scripts/links. -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <title>TidyWise — Cleaning Business Software for Maid Services</title>
    <meta name="description" content="The all-in-one platform for cleaning business owners. Online booking, scheduling, invoicing, payments, and CRM in one dashboard. Free forever for cleaning teams." />

    <!-- Open Graph (defaults; SEOHead updates per route) -->
    <meta property="og:title" content="TidyWise — Cleaning Business Software" />
    <meta property="og:description" content="The all-in-one platform for cleaning business owners. Online booking, scheduling, invoicing, payments, and CRM in one dashboard." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TidyWise" />
    <meta property="og:image" content="https://www.jointidywise.com/images/tidywise-og.png" />
    <meta property="og:image:width" content="1920" />
    <meta property="og:image:height" content="1080" />
    <meta property="og:url" content="https://www.jointidywise.com/" />

    <!-- Twitter Card (defaults; SEOHead updates per route) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TidyWise — Cleaning Business Software" />
    <meta name="twitter:description" content="The all-in-one platform for cleaning business owners. Online booking, scheduling, invoicing, payments, and CRM in one dashboard." />
    <meta name="twitter:image" content="https://www.jointidywise.com/images/tidywise-og.png" />

    <!-- Canonical (default; SEOHead updates href per route) -->
    <link rel="canonical" href="https://www.jointidywise.com/" />

    <!-- Mobile / PWA hints (after the SEO-critical block) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Author & Keywords (not managed by SEOHead) -->
    <meta name="author" content="TidyWise" />
    <meta name="keywords" content="cleaning business software, maid service software, cleaning company CRM, booking software for cleaning business, house cleaning software, cleaning scheduling software, janitorial software, housekeeping management, Booking Koala alternative, Jobber alternative, cleaning business management software" />

    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="6lZT4WUePfR_tgzuYn5kq_rnd77Hs6QiNxA2SE" />

    <!-- Default robots directive (Helmet overrides per-route for private pages) -->
    <meta name="robots" content="index, follow" />

    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/tidywise-logo.png" />

    <!-- Preload optimized logo (non-blocking) -->
    <link rel="preload" as="image" href="/images/tidywise-logo.webp" type="image/webp" />
    
    <!-- DNS prefetch & preconnect for third-party services -->
    <link rel="dns-prefetch" href="https://slwfkaqczvwvvvavkgpr.supabase.co" />
    <link rel="preconnect" href="https://slwfkaqczvwvvvavkgpr.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://js.stripe.com" />
    <link rel="dns-prefetch" href="https://maps.googleapis.com" />

    <!-- Print Shop typography: Space Grotesk display + IBM Plex Sans body + IBM Plex Mono numerals -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
